name: deploy-docC-on-github-page

on:
  workflow_dispatch

env:
  repo_name: ${{ github.event.repository.name }}
  xcodebuild_derivedData: ".derivedData"
  doc_path: "docs"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-26
    steps:
      - name: Package names
        run: echo "Generate DocC packages at ${{ env.repo_name }}"
      - name: Checkout Action
        uses: actions/checkout@v6
      - name: Create docs directory
        run: mkdir -p ${{ env.doc_path }}
      - name: Build DocC 
        run: make docc DOCC_OUTPUT_PATH=${{ env.doc_path }} HOSTING_BASE_PATH=${{ env.repo_name }}
      - name: Copy index page
        run: |
          cp .github/workflows/index.html ${{ env.doc_path }}/index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.doc_path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
