# Runner info : https://github.com/actions/runner-images
# Macos runner info : https://github.com/actions/runner-images/tree/main/images/macos

name: build-and-test
on:
  workflow_dispatch

env:
  swift_version: "6.2"
  xcode_path: "/Applications/Xcode_26.3.app"

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: "Package name"
        run: echo "Build all packages at ${{ github.workspace }}"
      - name: Set Swift Version
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: ${{ env.swift_version }}
      - name: Get swift version
        run: swift --version
      - name: Select Xcode
        run: sudo xcode-select -s ${{ env.xcode_path }}
      - name: Checkout Action
        uses: actions/checkout@v6
      - name: Build
        run: make build

  unit-test:
    name: Unit Test
    runs-on: macos-26
    steps:
      - name: "Package name"
        run: echo "Test all packages at ${{ github.workspace }}"
      - name: Set Swift Version
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: ${{ env.swift_version }}
      - name: Get swift version
        run: swift --version
      - name: Select Xcode
        run: sudo xcode-select -s ${{ env.xcode_path }}
      - name: Checkout Action
        uses: actions/checkout@v6
      - name: Test
        timeout-minutes: 15
        run: make test-unit

  snapshots-test:
    name: Snapshot Test
    runs-on: macos-26
    steps:
      - name: "Package name"
        run: echo "Test all packages at ${{ github.workspace }}"
      - name: Set Swift Version
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: ${{ env.swift_version }}
      - name: Get swift version
        run: swift --version
      - name: Select Xcode
        run: sudo xcode-select -s ${{ env.xcode_path }}
      - name: Checkout Action
        uses: actions/checkout@v6
      - name: Test
        timeout-minutes: 15
        run: make test-snapshots
